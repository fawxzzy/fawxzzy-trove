name: trove
archetype: next-web
repo: https://github.com/fawxzzy/fawxzzy-trove.git
branch: main
installCommand: npm ci
buildCommand: npm run build
startCommand: node scripts/start-static.mjs --port 3000
port: 3000
healthcheckPath: /healthz.json
env:
  mode: inline
  requiredKeys: []
deploy:
  strategy: rebuild
  workingDirectory: ..
runtime:
  restartPolicy: on-failure
  restorable: true
